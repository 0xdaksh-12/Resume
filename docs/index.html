<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daksh Jha — Resume</title>
    <meta
      name="description"
      content="Resume of Daksh Jha — Software Engineer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --surface: #141416;
        --border: #222226;
        --accent: #7c6af7;
        --accent-dim: #5548c8;
        --text: #e8e8ec;
        --muted: #6b6b78;
        --nav-h: 56px;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
      }

      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        z-index: 100;
        backdrop-filter: blur(12px);
      }

      .nav-name {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text);
      }
      .nav-name span {
        color: var(--accent);
      }

      #menu-btn {
        position: relative;
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      #menu-btn:hover {
        border-color: var(--accent);
        background: rgba(124, 106, 247, 0.08);
      }
      #menu-btn span {
        display: block;
        width: 18px;
        height: 1.5px;
        background: var(--text);
        border-radius: 2px;
        transition:
          transform 0.25s,
          opacity 0.2s;
        transform-origin: center;
      }
      #menu-btn.open span:nth-child(1) {
        transform: translateY(6.5px) rotate(45deg);
      }
      #menu-btn.open span:nth-child(2) {
        opacity: 0;
      }
      #menu-btn.open span:nth-child(3) {
        transform: translateY(-6.5px) rotate(-45deg);
      }

      #dropdown {
        position: fixed;
        top: calc(var(--nav-h) + 8px);
        right: 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 6px;
        min-width: 180px;
        display: none;
        flex-direction: column;
        gap: 2px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.15s ease;
        z-index: 200;
      }
      #dropdown.open {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .menu-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        color: var(--text);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 0.15s;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
      }
      .menu-item:hover {
        background: rgba(124, 106, 247, 0.12);
        color: var(--accent);
      }
      .menu-item svg {
        flex-shrink: 0;
        opacity: 0.75;
      }

      .pdf-wrap {
        position: fixed;
        top: var(--nav-h);
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
      }

      #pdf-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: var(--bg);
      }

      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 150;
      }
      #overlay.open {
        display: block;
      }
    </style>
  </head>
  <body>
    <nav>
      <span class="nav-name">Daksh <span>Jha</span></span>
      <button id="menu-btn" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div id="overlay"></div>

    <div id="dropdown" role="menu">
      <a
        class="menu-item"
        id="download-btn"
        href="Daksh_Resume.pdf"
        download="Daksh_Jha_Resume.pdf"
      >
        <!-- download icon -->
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download PDF
      </a>
      <a
        class="menu-item"
        href="https://github.com/0xflame-7"
        target="_blank"
        rel="noopener"
      >
        <!-- github icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.089-.744.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
          />
        </svg>
        GitHub
      </a>
    </div>

    <div class="pdf-wrap">
      <iframe
        id="pdf-frame"
        src="Daksh_Resume.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
        title="Daksh Jha Resume"
      ></iframe>
    </div>

    <script>
      const btn = document.getElementById("menu-btn");
      const dropdown = document.getElementById("dropdown");
      const overlay = document.getElementById("overlay");

      function openMenu() {
        btn.classList.add("open");
        dropdown.classList.add("open");
        overlay.classList.add("open");
        btn.setAttribute("aria-expanded", "true");
      }

      function closeMenu() {
        btn.classList.remove("open");
        dropdown.classList.remove("open");
        overlay.classList.remove("open");
        btn.setAttribute("aria-expanded", "false");
      }

      btn.addEventListener("click", () => {
        dropdown.classList.contains("open") ? closeMenu() : openMenu();
      });

      overlay.addEventListener("click", closeMenu);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMenu();
      });
    </script>
  </body>
</html>
